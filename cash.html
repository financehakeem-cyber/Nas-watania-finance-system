<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>NAS WATANIA - Cash Collection</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><link rel="stylesheet" href="style.css"></head><body>
<div class="topbar"><h1>NAS WATANIA Cash Collection</h1><div class="nav"><a href="invoice.html">Invoices</a><a href="cash.html">Cash Collection</a><a href="reports.html">Reports</a></div></div>
<div class="pagewrap"><div class="card"><div class="head-badge">Public Cash Desk</div><h3 style="margin-top:0;">Receipt Entry</h3>
<div class="grid">
<div class="field"><label>Passenger Name</label><input id="ccustomer" placeholder="Passenger Name"></div>
<div class="field"><label>Flight No</label><input id="cflightNo" placeholder="Flight No"></div>
<div class="field"><label>Service</label><select id="cservice"><option value="">Select Service</option><option>Handling</option><option>Wheelchare</option><option>EBT</option><option>CN.EBT</option><option>Travel Form</option><option>Insurance</option><option>MOPH</option><option>Other</option><option>Baggage Delivery</option><option>CIP</option></select></div>
<div class="field"><label>Currency</label><select id="ccurrency"><option value="">Select Currency</option><option>USD</option><option>IQD</option></select></div>
<div class="field"><label>Type</label><select id="ctype" onchange="onTypeChange()"><option value="">Select Type</option><option>Entry</option><option>Reverse</option><option>Payment</option><option>transfer</option></select></div>
<div class="field"><label>Company Name</label><input id="ccompany" placeholder="Company Name"></div>
<div class="field"><label>Amount</label><input id="camount" type="number" placeholder="0"></div>
<div class="field"><label>Description</label><input id="cnote" placeholder="Description"></div>
</div>
<div id="creverseBox" class="hidden" style="margin-top:8px;"><div class="field"><label>Enter Receipt No to Reverse</label><input id="creverseOf" placeholder="e.g. 2026020001"></div></div>
<div class="section-actions"><button class="action-btn primary" onclick="saveAndPrepare()">Save + Prepare</button><button class="action-btn secondary" onclick="newReceipt()">New Receipt</button></div>
<div class="hr"></div><h3 style="margin:0 0 8px 0;">Search Receipt</h3><div class="section-actions"><input id="csearchNo" placeholder="Enter Receipt No" style="flex:1; min-width:220px;"><button class="action-btn secondary" onclick="searchReceipt()">Search</button></div>
<div id="cprintArea" class="hidden"></div>
<div class="hr"></div><h3 style="margin:0 0 8px 0;">Daily Report</h3><div class="section-actions"><input type="date" id="creportDate" style="flex:1; min-width:220px;"><button class="action-btn primary" onclick="exportReceiptExcel()">Export Excel (.xlsx)</button></div></div></div>
<script>
let currentUser = 'Cash Desk';
let receipts = JSON.parse(localStorage.getItem('receipts_v9') || '[]');
let lastReceiptNo = '';
let isLastPrinted = true;
function onTypeChange(){const isReverse=document.getElementById('ctype').value==='Reverse';document.getElementById('creverseBox').classList.toggle('hidden',!isReverse);['ccustomer','cflightNo','cservice','ccurrency','ccompany','camount','cnote'].forEach(id=>{const el=document.getElementById(id);el.disabled=isReverse;if(isReverse) el.value='';});if(!isReverse) document.getElementById('creverseOf').value='';}
function generateReceiptNo(){const d=new Date();const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,'0');const prefix=String(y)+m;const count=receipts.filter(r=>String(r.no||'').startsWith(prefix)).length+1;return prefix+String(count).padStart(4,'0');}
function validateReceipt(){if(document.getElementById('ctype').value==='Reverse'){const no=document.getElementById('creverseOf').value.trim();if(!no){alert('Please enter receipt number to reverse');return false;}const orig=receipts.find(x=>String(x.no)===no);if(!orig){alert('Receipt not found');return false;}return true;}if(!document.getElementById('ccustomer').value.trim()||!document.getElementById('cflightNo').value.trim()||!document.getElementById('cservice').value||!document.getElementById('ccurrency').value||!document.getElementById('ctype').value||!document.getElementById('ccompany').value||!document.getElementById('camount').value||!document.getElementById('cnote').value.trim()){alert('Please complete data');return false;}return true;}
function saveAndPrepare(){if(!validateReceipt()) return; const now=new Date(); if(document.getElementById('ctype').value==='Reverse'){const origNo=document.getElementById('creverseOf').value.trim(); const original=receipts.find(x=>String(x.no)===origNo); const reversedEntry={no:generateReceiptNo(),emp:currentUser,customer:original.customer,flightNo:original.flightNo||'',service:original.service,currency:original.currency,type:'Reverse',company:original.company,amount:-Number(original.amount),note:'Reversal of Receipt No: '+origNo,date:now.toISOString().slice(0,10),dateTime:now.toISOString(),reverseOf:origNo}; receipts.push(reversedEntry); localStorage.setItem('receipts_v9',JSON.stringify(receipts)); lastReceiptNo=reversedEntry.no; isLastPrinted=false; renderPrintArea(reversedEntry); alert('Reverse saved.
New Receipt No: '+reversedEntry.no); return;} const r={no:generateReceiptNo(),emp:currentUser,customer:document.getElementById('ccustomer').value.trim(),flightNo:document.getElementById('cflightNo').value.trim(),service:document.getElementById('cservice').value,currency:document.getElementById('ccurrency').value,type:document.getElementById('ctype').value,company:document.getElementById('ccompany').value,amount:Number(document.getElementById('camount').value),note:document.getElementById('cnote').value.trim(),date:now.toISOString().slice(0,10),dateTime:now.toISOString(),reverseOf:''}; const t=r.type.toLowerCase(); if(t==='payment'||t==='transfer') r.amount=-Math.abs(r.amount); receipts.push(r); localStorage.setItem('receipts_v9',JSON.stringify(receipts)); lastReceiptNo=r.no; isLastPrinted=false; renderPrintArea(r); alert('Receipt saved.
Receipt No: '+r.no+'
Please print before creating new receipt.');}
function renderPrintArea(r){const title=(String(r.type||'').toLowerCase()==='payment')?'PAYMENT REQUEST':'RECEIPT'; const dt=String(r.dateTime||'').replace('T',' ').slice(0,19); const reverseRow=(r.type==='Reverse'&&r.reverseOf)?`<div class="pair"><b>Reverse Of</b><span>${r.reverseOf}</span></div>`:''; const area=document.getElementById('cprintArea'); area.classList.remove('hidden'); area.innerHTML=`<div class="receipt-box"><h2 style="text-align:center;margin-top:0;">${title}</h2><div class="pair"><b>Receipt No</b><span>${r.no}</span></div>${reverseRow}<div class="pair"><b>Date</b><span>${dt}</span></div><div class="pair"><b>Employee</b><span>${r.emp||''}</span></div><div class="pair"><b>Passenger</b><span>${r.customer}</span></div><div class="pair"><b>Flight No</b><span>${r.flightNo||''}</span></div><div class="pair"><b>Service</b><span>${r.service}</span></div><div class="pair"><b>Type</b><span>${r.type}</span></div><div class="pair"><b>Company</b><span>${r.company}</span></div><div class="pair"><b>Amount</b><span>${Number(r.amount)||0} ${r.currency}</span></div><div class="pair"><b>Description</b><span>${r.note}</span></div><div class="signrow"><div>Receiver Name</div><div>Delivered By</div></div><div class="signrow"><div>Financial Manager</div><div>General Manager</div></div><div class="section-actions" style="justify-content:center;"><button class="action-btn primary" onclick="markPrinted()">Print</button></div></div>`;}
function markPrinted(){isLastPrinted=true;window.print();}
function newReceipt(){if(!lastReceiptNo||isLastPrinted){clearReceiptFields();return;}alert('You need to print the receipt first.
Receipt No: '+lastReceiptNo);}
function clearReceiptFields(){['ccustomer','cflightNo','cservice','ccurrency','ctype','ccompany','camount','cnote','creverseOf','csearchNo'].forEach(id=>{const el=document.getElementById(id); if(el) el.value='';}); onTypeChange(); const a=document.getElementById('cprintArea'); a.classList.add('hidden'); a.innerHTML='';}
function searchReceipt(){const no=document.getElementById('csearchNo').value.trim(); if(!no) return alert('Enter Receipt No'); const r=receipts.find(x=>String(x.no)===no); if(!r) return alert('Receipt not found'); renderPrintArea(r);}
function exportReceiptExcel(){const d=document.getElementById('creportDate').value; if(!d) return alert('Select date'); const data=receipts.filter(r=>r.date===d); if(data.length===0) return alert('No data'); const rows=data.map(r=>({'Receipt No':r.no,'Employee':r.emp||'','Type':r.type,'Reverse Of':(r.type==='Reverse')?(r.reverseOf||''):'','Passenger':r.customer,'Flight No':r.flightNo||'','Service':r.service,'Company':r.company,'Currency':r.currency,'Amount':Number(r.amount)||0,'Description':r.note,'DateTime':String(r.dateTime||'').replace('T',' ').slice(0,19)})); const ws=XLSX.utils.json_to_sheet(rows); const keys=Object.keys(rows[0]); ws['!cols']=keys.map(k=>{let maxLen=k.length; rows.forEach(r=>maxLen=Math.max(maxLen,String(r[k]??'').length)); return {wch:Math.min(Math.max(maxLen+2,12),45)};}); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Daily Report'); XLSX.writeFile(wb,'Daily_Report_'+d+'.xlsx');}
</script></body></html>
