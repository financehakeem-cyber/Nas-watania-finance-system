<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>NAS WATANIA - Reports</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script><link rel="stylesheet" href="style.css"></head><body>
<div class="topbar"><h1>NAS WATANIA Reports</h1><div class="nav"><a href="invoice.html">Invoices</a><a href="cash.html">Cash Collection</a><a href="reports.html">Reports</a></div></div>
<div class="pagewrap">
<div class="card"><h3>Summary</h3><p>Total Invoices: <strong id="invoiceCount">0</strong></p><p>Total Invoice Value: <strong id="invoiceValue">0.00</strong></p><p>Total Cash Receipts: <strong id="receiptCount">0</strong></p><p>Total Cash Value: <strong id="receiptValue">0.00</strong></p></div>
<div class="card"><h3>Export Invoices</h3><button class="action-btn primary" onclick="exportInvoices()">Export Invoice Excel</button></div>
<div class="card"><h3>Export Cash Receipts</h3><div class="section-actions"><input type="date" id="receiptDate"><button class="action-btn primary" onclick="exportReceiptsByDate()">Export Receipts by Date</button></div></div>
</div>
<script>
function getInvoices(){return JSON.parse(localStorage.getItem('ops_invoices')||'[]');}
function getReceipts(){return JSON.parse(localStorage.getItem('receipts_v9')||'[]');}
function render(){const invoices=getInvoices(); const receipts=getReceipts(); document.getElementById('invoiceCount').innerText=invoices.length; document.getElementById('invoiceValue').innerText=invoices.reduce((a,b)=>a+(parseFloat(b.grandTotal)||0),0).toFixed(2); document.getElementById('receiptCount').innerText=receipts.length; document.getElementById('receiptValue').innerText=receipts.reduce((a,b)=>a+(parseFloat(b.amount)||0),0).toFixed(2);}
function exportInvoices(){const invoices=getInvoices(); if(!invoices.length) return alert('No invoices to export'); const rows=[]; invoices.forEach(inv=>{const base={'Invoice No':inv.invoiceNo||'','Date':inv.date||'','Airline':inv.airline||'','Flight No':inv.flightNo||'','A/C Reg.':inv.acReg||'','Flight Type':inv.flightType||'','OPS':inv.ops||'','MTOW':inv.mtow||'','ATA':inv.ata||'','STA':inv.sta||'','Diff Arr. in Min':inv.arrDiff||'','ATD':inv.atd||'','STD':inv.std||'','Diff Dep. in Min':inv.depDiff||'','Area':inv.area||'','KM':inv.km||'','Comment':inv.comment||'','Grand Total':Number(inv.grandTotal||0).toFixed(2),'Created By':inv.createdBy||'','Is Reversal':inv.isReversal?'Yes':'No','Reversed From':inv.reversedFrom||'','Reversed By Invoice No':inv.reversedByInvoiceNo||''}; if(Array.isArray(inv.services)){inv.services.forEach(s=>{base[`${s.service} QTY`]=s.qty;base[`${s.service} Unit Price`]=parseFloat(s.unitPrice)||0;});} rows.push(base);}); const wb=XLSX.utils.book_new(); const ws=XLSX.utils.json_to_sheet(rows); XLSX.utils.book_append_sheet(wb,ws,'Invoices'); XLSX.writeFile(wb,'NAS_WATANIA_INVOICE_REPORT.xlsx');}
function exportReceiptsByDate(){const d=document.getElementById('receiptDate').value; if(!d) return alert('Select date'); const data=getReceipts().filter(r=>r.date===d); if(!data.length) return alert('No data'); const rows=data.map(r=>({'Receipt No':r.no,'Employee':r.emp||'','Type':r.type,'Reverse Of':(r.type==='Reverse')?(r.reverseOf||''):'','Passenger':r.customer,'Flight No':r.flightNo||'','Service':r.service,'Company':r.company,'Currency':r.currency,'Amount':Number(r.amount)||0,'Description':r.note,'DateTime':String(r.dateTime||'').replace('T',' ').slice(0,19)})); const wb=XLSX.utils.book_new(); const ws=XLSX.utils.json_to_sheet(rows); XLSX.utils.book_append_sheet(wb,ws,'Receipts'); XLSX.writeFile(wb,'Daily_Report_'+d+'.xlsx');}
render();
</script></body></html>
